name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'fc349a7b35348173d4d24621ae04ad80e2375957'

      - name: Configure CMake
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: |
          cd build
          Get-ChildItem Release/*.dll | Copy-Item -Destination .
          Write-Host "=== Test 1: synthetic 4x4 ==="
          Release/test_decode.exe test/samples/test.heic
          Write-Host "=== Test 2: real iPhone photo ==="
          Release/test_decode.exe test/samples/sewing-threads.heic
          Write-Host "=== Test 3: WIC discovery (requires admin - skipped on CI) ==="
          Write-Host "Run test_wic_discovery.exe manually on a machine with the codec registered"
        shell: pwsh

      - name: Collect artifacts
        run: |
          mkdir artifact
          Get-ChildItem build/Release/*.dll | Copy-Item -Destination artifact/
          Get-ChildItem build/Release/*.exe | Copy-Item -Destination artifact/
          Copy-Item installer/install.ps1 artifact/
          Copy-Item installer/uninstall.ps1 artifact/
          Get-ChildItem artifact/
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: heic-wic-codec
          path: artifact/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: heic-wic-codec
          path: artifact/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*
